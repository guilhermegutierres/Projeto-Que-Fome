<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro - Que Fome!</title>

  <link rel="stylesheet" href="assets/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- BOTÃO VOLTAR -->
<a href="login.html" class="back-button">← Voltar</a>

<div class="auth-container">

  <div class="auth-box">
    
    <h1>Que fome!</h1>
    <p class="subtitle">Crie sua conta para salvar receitas</p>

    <form id="cadastroForm">

      <div class="input-group">
        <label>Nome de usuário</label>
        <input type="text" id="nome" placeholder="Ex: Guilherme" required>
      </div>

      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
      </div>

      <div class="input-group">
        <label>Confirmar senha</label>
        <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
      </div>

      <button type="submit">Criar conta</button>

    </form>

    <div class="links">
      <span>Já tem conta?</span>
      <a href="login.html">Entrar</a>
    </div>

  </div>

</div>

<script src="assets/js/auth.js"></script>

</body>
</html>
